version: "3.9"

name: anjab-stack

services:
  anjab-db:
    image: postgres:17-alpine
    container_name: anjab-db
    env_file:
      - .env.docker
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5437:5437"                           # host=5437 → container=5437
    command: ["postgres", "-c", "port=5437"]  # override port internal
    volumes:
      - anjab-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pandawa -p 5437 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  anjab-app:
    build:
      context: .
    container_name: anjab-app
    depends_on:
      anjab-db:
        condition: service_healthy
    env_file:
      - .env.docker
    environment:
      - PYTHON_BIN=/usr/bin/python3
      - SOFFICE_BIN=/usr/bin/soffice
      - SOFFICE_DIR=/usr/bin
      # - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium   # aktifkan jika perlu
    ports:
      - "8087:8087"
    volumes:
      - ./storage/pdf-cache:/app/storage/pdf-cache
    restart: unless-stopped

  anjab-pgadmin:
    image: dpage/pgadmin4:8
    container_name: anjab-pgadmin
    env_file:
      - .env.docker
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "9097:80"
    depends_on:
      - anjab-db
    volumes:
      - anjab-pgadmin-data:/var/lib/pgadmin
    restart: unless-stopped

volumes:
  anjab-pgdata:
  anjab-pgadmin-data:
